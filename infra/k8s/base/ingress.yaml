apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devworkflow-ingress
  namespace: devworkflow
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: devworkflow.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devworkflow-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devworkflow-web
                port:
                  number: 3000