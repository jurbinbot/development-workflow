apiVersion: apps/v1
kind: Deployment
metadata:
  name: devworkflow-web
  namespace: devworkflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devworkflow-web
  template:
    metadata:
      labels:
        app: devworkflow-web
    spec:
      containers:
        - name: web
          image: ghcr.io/jurbinbot/devworkflow-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://devworkflow-api:3001"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devworkflow-web
  namespace: devworkflow
spec:
  selector:
    app: devworkflow-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP