# Skupper Service Exposure for PostgreSQL Replication
# Apply on CLUSTER 1 (Primary) to expose PostgreSQL for replica connections

---
# Expose PostgreSQL read-write service through Skupper
# This allows the replica cluster to connect to the primary
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: postgres-primary
  namespace: devworkflow
spec:
  routingKey: postgres-rw
  port: 5432
  selector: postgres-rw
  host: postgres-rw
---
# Note: On the replica cluster (Cluster 2), you need a Listener
# that connects to the Skupper-exposed primary:

# apiVersion: skupper.io/v2alpha1
# kind: Listener
# metadata:
#   name: postgres-primary
#   namespace: devworkflow
# spec:
#   routingKey: postgres-rw
#   port: 5432
#   host: postgres-rw.skupper
#   type: service

---
# Alternative using Skupper CLI commands:
# 
# On Cluster 1 (Primary):
# skupper expose service postgres-rw --port 5432 -n devworkflow
#
# On Cluster 2 (Replica):
# skupper service create postgres-rw-skupper 5432 -n devworkflow
# The replica's pg_basebackup will connect via this Skupper service