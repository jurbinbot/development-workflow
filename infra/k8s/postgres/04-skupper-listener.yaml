# Skupper Listener for PostgreSQL Primary
# Apply on CLUSTER 2 (Replica) to connect to the primary via Skupper

---
apiVersion: skupper.io/v2alpha1
kind: Listener
metadata:
  name: postgres-primary
  namespace: devworkflow
spec:
  routingKey: postgres-rw
  port: 5432
  host: postgres-rw.skupper
  type: service