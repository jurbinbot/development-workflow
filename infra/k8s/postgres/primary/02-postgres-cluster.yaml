# PostgreSQL Primary Cluster
# CloudNativePG manages the primary with replicas for HA

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: devworkflow
spec:
  # Instance configuration
  instances: 3
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised

  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

  # Storage configuration
  storage:
    size: 10Gi
    storageClass: ""
    resizeMode: pvc

  # WAL storage (for replication)
  walStorage:
    size: 5Gi
    storageClass: ""

  # Bootstrap configuration - create database on first run
  bootstrap:
    initdb:
      database: devworkflow
      owner: devworkflow
      secret:
        name: postgres-credentials

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "512MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "128MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      # Replication settings for cross-cluster
      wal_level: replica
      max_wal_senders: "10"
      max_replication_slots: "10"
      hot_standby: "on"
      hot_standby_feedback: "on"
      wal_keep_size: "1GB"

  # Replication slots for HA
  replicationSlots:
    highAvailability:
      enabled: true
    synchronizeReplicas:
      enabled: true

  # Service configuration
  serviceUpdateStrategy:
    type: RollingUpdate

  # Enable connection pooling (optional)
  # managedServices:
  #   disabledDefaultServices: [ "ro" ]