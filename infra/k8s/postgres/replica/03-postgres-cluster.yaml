# PostgreSQL Replica Cluster
# Bootstraps from primary cluster via pg_basebackup through Skupper

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: devworkflow
spec:
  # Instance configuration
  instances: 3
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised

  # PostgreSQL version (must match primary)
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

  # Storage configuration
  storage:
    size: 10Gi
    storageClass: ""
    resizeMode: pvc

  # WAL storage
  walStorage:
    size: 5Gi
    storageClass: ""

  # Bootstrap from primary cluster via Skupper
  bootstrap:
    pg_basebackup:
      source: primary-cluster
      database: devworkflow
      owner: devworkflow

  # External cluster reference (the primary via Skupper)
  externalClusters:
    - name: primary-cluster
      connectionParameters:
        # Connect to Skupper listener
        host: postgres-primary.devworkflow.svc
        port: "5432"
        user: postgres
        dbname: devworkflow
      password:
        name: postgres-superuser
        key: password

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "512MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "128MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      hot_standby: "on"
      hot_standby_feedback: "on"

  # Replication slots
  replicationSlots:
    highAvailability:
      enabled: true

  # Service configuration
  serviceUpdateStrategy:
    type: RollingUpdate