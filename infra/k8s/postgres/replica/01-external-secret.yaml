# External Secret for PostgreSQL credentials
# Must match the primary cluster credentials

---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: devworkflow
spec:
  provider:
    # Configure your secret backend here
    aws:
      service: secretsmanager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: devworkflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: devworkflow/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: devworkflow/postgres
        property: password
    - secretKey: host
      remoteRef:
        key: devworkflow/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: devworkflow/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: devworkflow/postgres
        property: database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-superuser
  namespace: devworkflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgres-superuser
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: devworkflow/postgres-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: devworkflow/postgres-superuser
        property: password
---
# Application database URL secret
# Read/write via Skupper to primary, read from local replica
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-app-credentials
  namespace: devworkflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgres-app-credentials
    creationPolicy: Owner
  data:
    # Write through Skupper to primary
    - secretKey: DATABASE_URL
      remoteRef:
        key: devworkflow/app
        property: database_url
    # Read from local replica (faster)
    - secretKey: DATABASE_URL_RO
      remoteRef:
        key: devworkflow/app
        property: database_url_ro