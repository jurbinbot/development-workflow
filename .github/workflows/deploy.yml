name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Helm
        run: |
          VERSION="${{ github.event.inputs.version || 'latest' }}"
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          
          helm upgrade --install devworkflow ./infra/k8s/helm/devworkflow \
            --namespace devworkflow-$ENV \
            --create-namespace \
            --set image.api.tag=$VERSION \
            --set image.web.tag=$VERSION \
            --set secrets.api.databaseUrl="${{ secrets.DATABASE_URL }}" \
            --set secrets.api.sessionSecret="${{ secrets.SESSION_SECRET }}" \
            --set secrets.api.adminEmail="${{ secrets.ADMIN_EMAIL }}" \
            --set secrets.api.adminPassword="${{ secrets.ADMIN_PASSWORD }}" \
            --set secrets.api.ollamaBaseUrl="${{ secrets.OLLAMA_BASE_URL }}"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/devworkflow-api -n devworkflow-${{ github.event.inputs.environment || 'staging' }} --timeout=300s
          kubectl rollout status deployment/devworkflow-web -n devworkflow-${{ github.event.inputs.environment || 'staging' }} --timeout=300s

      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=devworkflow -n devworkflow-${{ github.event.inputs.environment || 'staging' }} --timeout=120s